<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐉 Dragon Chase – Angel Edition (SUPER FAST)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            touch-action: none;
        }
        #gameContainer {
            position: relative;
            border: 4px solid #ffd700;
            border-radius: 16px;
            box-shadow: 0 0 80px rgba(255, 215, 0, 0.15);
            background: #0f0c29;
        }
        canvas {
            display: block;
            border-radius: 12px;
            background: #0f0c29;
            cursor: pointer;
            width: 100%;
            height: auto;
        }
        #ui {
            position: absolute;
            top: 16px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 2px 12px rgba(0,0,0,0.9);
            pointer-events: none;
            z-index: 10;
        }
        #ui span {
            background: rgba(0,0,0,0.5);
            padding: 6px 18px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,215,0,0.15);
        }
        #gameOver {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            border-radius: 12px;
            z-index: 20;
            backdrop-filter: blur(6px);
        }
        #gameOver h1 {
            font-size: 52px;
            margin-bottom: 6px;
            color: #ffd700;
            text-shadow: 0 0 60px rgba(255,215,0,0.3);
        }
        #gameOver p {
            font-size: 20px;
            opacity: 0.8;
            margin: 4px 0;
        }
        #gameOver .final-score {
            font-size: 28px;
            color: #ffd700;
            margin: 12px 0 20px;
        }
        #restartBtn {
            background: #ffd700;
            border: none;
            color: #0a0a1a;
            font-size: 22px;
            font-weight: bold;
            padding: 14px 48px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Courier New', monospace;
            box-shadow: 0 0 40px rgba(255,215,0,0.2);
        }
        #restartBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 70px rgba(255,215,0,0.4);
        }
        #startMsg {
            position: absolute;
            bottom: 60px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 16px;
            pointer-events: none;
            z-index: 5;
            animation: pulse 1.6s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        @media (max-width: 600px) {
            #ui { font-size: 14px; top: 10px; left: 12px; right: 12px; }
            #gameOver h1 { font-size: 32px; }
            #restartBtn { font-size: 18px; padding: 12px 32px; }
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <div id="ui">
        <span>❤️ <span id="livesDisplay">3</span></span>
        <span>⭐ <span id="scoreDisplay">0</span></span>
    </div>
    <div id="startMsg">👆 Tap / Press Space to Jump</div>
    <div id="gameOver">
        <h1>💀 GAME OVER</h1>
        <p>The Dragon caught you!</p>
        <div class="final-score">⭐ Score: <span id="finalScore">0</span></div>
        <button id="restartBtn">🔄 Play Again</button>
    </div>
</div>

<script>
    // --- SETUP ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const W = 800, H = 400;
    const groundY = 340;

    // --- DOM ---
    const livesSpan = document.getElementById('livesDisplay');
    const scoreSpan = document.getElementById('scoreDisplay');
    const finalScoreSpan = document.getElementById('finalScore');
    const gameOverDiv = document.getElementById('gameOver');
    const startMsg = document.getElementById('startMsg');
    const restartBtn = document.getElementById('restartBtn');

    // --- GAME STATE ---
    let gameRunning = true;
    let score = 0;
    let lives = 3;
    let frame = 0;

    // --- PLAYER (VERY FAST) ---
    const player = {
        x: 80,
        y: groundY - 40,
        w: 28,
        h: 38,
        vy: 0,
        gravity: 0.6,
        jumpPower: -16,      // very high jump
        grounded: true,
        speed: 14,           // EXTREMELY FAST
        color: '#4fc3f7'
    };

    // --- DRAGON ---
    const dragon = {
        x: 750,
        y: groundY - 48,
        w: 50,
        h: 48,
        speed: 5.2,
        wingAngle: 0,
        color: '#ff6b35'
    };

    // --- OBSTACLES ---
    let obstacles = [];
    const obstacleTypes = [
        { w: 20, h: 20, color: '#ff6b6b' },
        { w: 24, h: 34, color: '#ffd93d' },
        { w: 18, h: 40, color: '#a29bfe' }
    ];

    // --- COINS ---
    let coins = [];
    let coinCount = 0;

    // --- PARTICLES ---
    let particles = [];

    // --- STARS (Background) ---
    let stars = [];
    for (let i = 0; i < 70; i++) {
        stars.push({
            x: Math.random() * W,
            y: Math.random() * (groundY - 20),
            size: Math.random() * 2 + 0.5,
            speed: Math.random() * 0.2 + 0.05
        });
    }

    // --- ANGEL ---
    const angel = {
        x: player.x - 10,
        y: player.y - 80,
        radius: 22,
        glow: 0,
        wingAngle: 0
    };

    // --- AUDIO (Web Audio API – no external files) ---
    let audioCtx = null;
    let isAudioPlaying = false;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (!isAudioPlaying) {
            playBackgroundMusic();
            isAudioPlaying = true;
        }
    }

    function playBackgroundMusic() {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;

        // Simple arpeggio-like background (angelic feel)
        const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
        let noteIndex = 0;

        function playNote() {
            if (!gameRunning) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = notes[noteIndex % notes.length];
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
            noteIndex++;
            // schedule next note
            const delay = 0.2 + Math.random() * 0.12;
            setTimeout(() => { if (gameRunning) playNote(); }, delay * 1000);
        }

        // start a soft pad drone (angelic hum)
        const drone = audioCtx.createOscillator();
        const droneGain = audioCtx.createGain();
        drone.type = 'sine';
        drone.frequency.value = 130.81; // C3
        droneGain.gain.setValueAtTime(0.04, audioCtx.currentTime);
        droneGain.gain.exponentialRampToValueAtTime(0.02, audioCtx.currentTime + 0.5);
        drone.connect(droneGain);
        droneGain.connect(audioCtx.destination);
        drone.start();
        drone.stop(audioCtx.currentTime + 60);

        // start the arpeggio
        playNote();

        // restart after drone ends
        setTimeout(() => {
            if (gameRunning) playBackgroundMusic();
        }, 60000);
    }

    // --- FUNCTIONS ---
    function resetGame() {
        player.y = groundY - 40;
        player.vy = 0;
        player.grounded = true;
        dragon.x = 750;
        obstacles = [];
        coins = [];
        particles = [];
        score = 0;
        lives = 3;
        coinCount = 0;
        gameRunning = true;
        gameOverDiv.style.display = 'none';
        updateUI();
        startMsg.style.display = 'block';
        setTimeout(() => { startMsg.style.display = 'none'; }, 2000);
        if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
        if (!isAudioPlaying) {
            initAudio();
        }
    }

    function updateUI() {
        livesSpan.textContent = lives;
        scoreSpan.textContent = score;
    }

    function jump() {
        if (player.grounded && gameRunning) {
            player.vy = player.jumpPower;
            player.grounded = false;
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x: player.x + player.w/2,
                    y: player.y + player.h,
                    vx: (Math.random() - 0.5) * 4,
                    vy: Math.random() * 2 + 1,
                    life: 20,
                    maxLife: 20,
                    color: '#4fc3f7'
                });
            }
        }
    }

    function spawnObstacle() {
        const type = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
        obstacles.push({
            x: W,
            y: groundY - type.h,
            w: type.w,
            h: type.h,
            color: type.color
        });
    }

    function spawnCoin() {
        coins.push({
            x: W,
            y: groundY - 30 - Math.random() * 60,
            w: 16,
            h: 16,
            radius: 8,
            color: '#ffd93d',
            bobOffset: Math.random() * Math.PI * 2
        });
    }

    function spawnParticles(x, y, color, count = 14) {
        for (let i = 0; i < count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 5 + 1;
            particles.push({
                x, y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed - 1,
                life: 30,
                maxLife: 30,
                color
            });
        }
    }

    // --- UPDATE ---
    function update() {
        if (!gameRunning) return;
        frame++;

        // ---- Player ----
        player.vy += player.gravity;
        player.y += player.vy;

        if (player.y >= groundY - player.h) {
            player.y = groundY - player.h;
            player.vy = 0;
            player.grounded = true;
        } else {
            player.grounded = false;
        }

        // ---- Dragon ----
        dragon.x -= dragon.speed;
        dragon.wingAngle += 0.14;
        if (dragon.x < -dragon.w - 20) {
            dragon.x = W + 50;
            dragon.speed += 0.12;
        }

        // ---- Angel follows player ----
        angel.x = player.x - 6;
        angel.y = player.y - 75 + Math.sin(frame * 0.04) * 6;
        angel.glow = 0.7 + Math.sin(frame * 0.03) * 0.15;
        angel.wingAngle += 0.06;

        // ---- Spawn obstacles ----
        if (frame % 55 === 0) spawnObstacle(); // more frequent

        // ---- Spawn coins ----
        if (frame % 28 === 0) spawnCoin();

        // ---- Obstacles collision ----
        for (let i = obstacles.length - 1; i >= 0; i--) {
            const obs = obstacles[i];
            obs.x -= 7.0; // faster obstacles
            if (obs.x < player.x + player.w &&
                obs.x + obs.w > player.x &&
                obs.y < player.y + player.h &&
                obs.y + obs.h > player.y) {
                spawnParticles(player.x + player.w/2, player.y + player.h/2, '#ff6b6b', 18);
                lives--;
                updateUI();
                obstacles.splice(i, 1);
                if (lives <= 0) { gameOver(); }
                continue;
            }
            if (obs.x + obs.w < 0) obstacles.splice(i, 1);
        }

        // ---- Coins ----
        for (let i = coins.length - 1; i >= 0; i--) {
            const coin = coins[i];
            coin.x -= 6.0;
            coin.bobOffset += 0.07;
            const dx = (player.x + player.w/2) - (coin.x + coin.radius);
            const dy = (player.y + player.h/2) - (coin.y + coin.radius);
            if (Math.sqrt(dx*dx + dy*dy) < coin.radius + 16) {
                score += 10;
                coinCount++;
                spawnParticles(coin.x, coin.y, '#ffd93d', 12);
                coins.splice(i, 1);
                updateUI();
                continue;
            }
            if (coin.x + coin.radius < 0) coins.splice(i, 1);
        }

        // ---- Particles ----
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.04;
            p.life--;
            if (p.life <= 0) particles.splice(i, 1);
        }

        // ---- Dragon catches player ----
        if (dragon.x < player.x + player.w &&
            dragon.x + dragon.w > player.x &&
            dragon.y < player.y + player.h &&
            dragon.y + dragon.h > player.y) {
            spawnParticles(player.x + player.w/2, player.y + player.h/2, '#ff6b35', 28);
            lives--;
            updateUI();
            player.x = 80;
            player.y = groundY - 40;
            player.vy = -8;
            if (lives <= 0) gameOver();
        }

        // ---- Stars ----
        for (const star of stars) {
            star.x -= star.speed;
            if (star.x < 0) { star.x = W; star.y = Math.random() * (groundY - 20); }
        }
    }

    // --- DRAW ---
    function draw() {
        ctx.clearRect(0, 0, W, H);

        // Background
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, '#0f0c29');
        grad.addColorStop(0.5, '#1a1a3e');
        grad.addColorStop(1, '#16213e');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        // Stars
        for (const star of stars) {
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.fill();
        }

        // ---- ANGEL (glowing) ----
        const ax = angel.x, ay = angel.y;
        // glow
        const glow = ctx.createRadialGradient(ax+14, ay+14, 4, ax+14, ay+14, 50);
        glow.addColorStop(0, `rgba(255,215,0,${0.25 * angel.glow})`);
        glow.addColorStop(0.5, `rgba(255,215,0,${0.1 * angel.glow})`);
        glow.addColorStop(1, 'rgba(255,215,0,0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(ax+14, ay+14, 50, 0, Math.PI*2);
        ctx.fill();

        // wings
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.shadowColor = '#ffd700';
        ctx.shadowBlur = 30;
        const wingFlap = Math.sin(angel.wingAngle) * 8;
        // left wing
        ctx.beginPath();
        ctx.moveTo(ax+8, ay+12);
        ctx.quadraticCurveTo(ax-30 + wingFlap, ay-20, ax+4, ay+6);
        ctx.fill();
        // right wing
        ctx.beginPath();
        ctx.moveTo(ax+20, ay+12);
        ctx.quadraticCurveTo(ax+58 - wingFlap, ay-20, ax+24, ay+6);
        ctx.fill();

        // body (light)
        ctx.shadowBlur = 40;
        ctx.fillStyle = 'rgba(255, 255, 240, 0.85)';
        ctx.beginPath();
        ctx.arc(ax+14, ay+14, 12, 0, Math.PI*2);
        ctx.fill();

        // halo
        ctx.shadowBlur = 50;
        ctx.strokeStyle = 'rgba(255,215,0,0.5)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(ax+14, ay+8, 16, Math.PI, 2*Math.PI);
        ctx.stroke();

        ctx.shadowBlur = 0;

        // ---- Ground ----
        ctx.fillStyle = '#1e2a2a';
        ctx.fillRect(0, groundY, W, groundY+60);
        ctx.strokeStyle = '#2a3a3a';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, groundY);
        ctx.lineTo(W, groundY);
        ctx.stroke();

        // ---- Coins ----
        for (const coin of coins) {
            const bobY = Math.sin(coin.bobOffset) * 4;
            const cy = coin.y + bobY;
            ctx.fillStyle = coin.color;
            ctx.shadowColor = '#ffd93d';
            ctx.shadowBlur = 18;
            ctx.beginPath();
            ctx.arc(coin.x+8, cy+8, 8, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#f9a825';
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('★', coin.x+8, cy+9);
        }

        // ---- Obstacles ----
        for (const obs of obstacles) {
            ctx.fillStyle = obs.color;
            ctx.shadowColor = obs.color;
            ctx.shadowBlur = 12;
            ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
            ctx.shadowBlur = 0;
        }

        // ---- Player (Boy) ----
        const px = player.x, py = player.y;
        ctx.shadowBlur = 0;

        // shadow
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.ellipse(px+14, groundY+4, 18, 5, 0, 0, Math.PI*2);
        ctx.fill();

        // body
        ctx.fillStyle = player.color;
        ctx.shadowColor = '#4fc3f7';
        ctx.shadowBlur = 12;
        ctx.fillRect(px+5, py+12, 18, 20);

        // head
        ctx.beginPath();
        ctx.arc(px+14, py+10, 12, 0, Math.PI*2);
        ctx.fill();

        // skin
        ctx.fillStyle = '#ffccbc';
        ctx.shadowBlur = 4;
        ctx.beginPath();
        ctx.arc(px+14, py+10, 9, 0, Math.PI*2);
        ctx.fill();

        // eyes
        ctx.fillStyle = '#1a1a2e';
        ctx.beginPath();
        ctx.arc(px+10, py+8, 2.5, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(px+18, py+8, 2.5, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(px+9, py+7, 1.2, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(px+17, py+7, 1.2, 0, Math.PI*2);
        ctx.fill();

        // smile
        ctx.strokeStyle = '#c62828';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(px+14, py+13, 4, 0.1, Math.PI-0.1);
        ctx.stroke();

        // hair
        ctx.fillStyle = '#3e2723';
        ctx.shadowBlur = 0;
        ctx.beginPath();
        ctx.arc(px+14, py+6, 10, Math.PI, 2*Math.PI);
        ctx.fill();
        ctx.fillRect(px+6, py-1, 4, 6);
        ctx.fillRect(px+18, py-1, 4, 6);
        ctx.fillRect(px+11, py-3, 6, 6);

        // legs
        ctx.fillStyle = '#37474f';
        ctx.fillRect(px+7, py+32, 6, 10);
        ctx.fillRect(px+15, py+32, 6, 10);

        // shoes
        ctx.fillStyle = '#ff6b35';
        ctx.fillRect(px+5, py+40, 10, 4);
        ctx.fillRect(px+13, py+40, 10, 4);

        // arms
        ctx.fillStyle = '#ffccbc';
        ctx.fillRect(px+1, py+16, 6, 10);
        ctx.fillRect(px+21, py+16, 6, 10);

        // cap
        ctx.fillStyle = '#d32f2f';
        ctx.beginPath();
        ctx.ellipse(px+14, py+3, 12, 4, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.fillRect(px+2, py, 24, 4);
        ctx.shadowBlur = 0;

        // ---- Dragon ----
        const dx = dragon.x, dy = dragon.y;
        const wing = Math.sin(dragon.wingAngle) * 14;

        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.beginPath();
        ctx.ellipse(dx+25, groundY+6, 30, 7, 0, 0, Math.PI*2);
        ctx.fill();

        ctx.fillStyle = dragon.color;
        ctx.shadowColor = '#ff6b35';
        ctx.shadowBlur = 20;
        ctx.beginPath();
        ctx.ellipse(dx+25, dy+24, 28, 22, 0, 0, Math.PI*2);
        ctx.fill();

        ctx.beginPath();
        ctx.ellipse(dx+45, dy+16, 16, 14, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.fillRect(dx+32, dy+14, 14, 16);

        ctx.fillStyle = '#e65100';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.moveTo(dx+10, dy+12);
        ctx.quadraticCurveTo(dx-10 + wing, dy-22, dx+8, dy+6);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(dx+40, dy+12);
        ctx.quadraticCurveTo(dx+60 - wing, dy-22, dx+42, dy+6);
        ctx.fill();

        ctx.fillStyle = '#ffd93d';
        ctx.shadowBlur = 18;
        ctx.shadowColor = '#ffd93d';
        ctx.beginPath();
        ctx.arc(dx+50, dy+12, 5, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(dx+40, dy+12, 5, 0, Math.PI*2);
        ctx.fill();

        ctx.fillStyle = '#1a1a2e';
        ctx.shadowBlur = 0;
        ctx.beginPath();
        ctx.arc(dx+52, dy+12, 2.5, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(dx+42, dy+12, 2.5, 0, Math.PI*2);
        ctx.fill();

        // fire breath
        if (dragon.x < 220) {
            ctx.fillStyle = 'rgba(255,107,53,0.2)';
            ctx.shadowBlur = 40;
            ctx.shadowColor = '#ff6b35';
            ctx.beginPath();
            ctx.moveTo(dx+60, dy+18);
            ctx.quadraticCurveTo(dx+100, dy-12, dx+90, dy+28);
            ctx.quadraticCurveTo(dx+100, dy+48, dx+60, dy+28);
            ctx.fill();
            ctx.fillStyle = 'rgba(255,217,61,0.12)';
            ctx.beginPath();
            ctx.moveTo(dx+60, dy+22);
            ctx.quadraticCurveTo(dx+80, dy+8, dx+75, dy+26);
            ctx.quadraticCurveTo(dx+80, dy+42, dx+60, dy+26);
            ctx.fill();
        }

        ctx.fillStyle = '#ff8a65';
        ctx.shadowBlur = 0;
        ctx.beginPath();
        ctx.ellipse(dx+25, dy+32, 18, 10, 0, 0, Math.PI*2);
        ctx.fill();

        ctx.fillStyle = '#e65100';
        for (let i = 0; i < 4; i++) {
            const sx = dx+8 + i*10;
            const sy = dy+6 + Math.sin(i*0.8)*4;
            ctx.beginPath();
            ctx.moveTo(sx, sy);
            ctx.lineTo(sx+4, sy-12);
            ctx.lineTo(sx+8, sy);
            ctx.fill();
        }

        ctx.shadowBlur = 0;

        // ---- Particles ----
        for (const p of particles) {
            const alpha = p.life / p.maxLife;
            ctx.globalAlpha = alpha;
            ctx.fillStyle = p.color;
            ctx.shadowBlur = 8;
            ctx.shadowColor = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 3 * alpha + 1, 0, Math.PI*2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;
    }

    // --- GAME OVER ---
    function gameOver() {
        gameRunning = false;
        finalScoreSpan.textContent = score;
        gameOverDiv.style.display = 'flex';
        if (audioCtx) audioCtx.suspend();
    }

    // --- LOOP ---
    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    // --- CONTROLS ---
    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space') { e.preventDefault(); initAudio(); jump(); }
    });
    canvas.addEventListener('click', () => { initAudio(); jump(); });
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); initAudio(); jump(); });
    restartBtn.addEventListener('click', () => { initAudio(); resetGame(); });

    // --- START ---
    resetGame();
    gameLoop();
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    function resizeCanvas() {
        const container = document.getElementById('gameContainer');
        const maxW = window.innerWidth - 40;
        const maxH = window.innerHeight - 40;
        const aspect = 800/400;
        let w = maxW, h = w/aspect;
        if (h > maxH) { h = maxH; w = h*aspect; }
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
    }
</script>
</body>
</html>
